services:
  mariadb:
    image: mariadb:10.11
    container_name: wordpress_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - wp_network

  wordpress:
    image: wordpress:${WORDPRESS_VERSION}-php${PHP_VERSION}-fpm
    restart: always
    depends_on:
      - mariadb
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - ./html:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - wp_network

  wpcli:
    image: wordpress:cli-php${PHP_VERSION}
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_URL: ${WORDPRESS_URL}
      WORDPRESS_SITE_TITLE: ${WORDPRESS_SITE_TITLE}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
    user: "33:33"
    command:
      - /bin/sh
      - -c
      - |
        set -eu;
        : "$$WORDPRESS_DB_HOST";
        : "$$WORDPRESS_DB_NAME";
        : "$$WORDPRESS_DB_USER";
        : "$$WORDPRESS_DB_PASSWORD";
        : "$$WORDPRESS_URL";
        : "$$WORDPRESS_SITE_TITLE";
        : "$$WORDPRESS_ADMIN_USER";
        : "$$WORDPRESS_ADMIN_PASSWORD";
        : "$$WORDPRESS_ADMIN_EMAIL";
        until [ -f /var/www/html/wp-load.php ] && [ -d /var/www/html/wp-includes ]; do
          echo "Waiting for WordPress files...";
          sleep 3;
        done;
        if [ ! -f /var/www/html/wp-config.php ]; then
          wp config create \
            --path=/var/www/html \
            --dbname="$$WORDPRESS_DB_NAME" \
            --dbuser="$$WORDPRESS_DB_USER" \
            --dbpass="$$WORDPRESS_DB_PASSWORD" \
            --dbhost="$$WORDPRESS_DB_HOST" \
            --skip-check;
        fi;
        wp config set DB_NAME "$$WORDPRESS_DB_NAME" --path=/var/www/html;
        wp config set DB_USER "$$WORDPRESS_DB_USER" --path=/var/www/html;
        wp config set DB_PASSWORD "$$WORDPRESS_DB_PASSWORD" --path=/var/www/html;
        wp config set DB_HOST "$$WORDPRESS_DB_HOST" --path=/var/www/html;
        attempts=0;
        until php -r '$$h=getenv("WORDPRESS_DB_HOST"); $$port=3306; if (strpos($$h, ":") !== false) { [$$h, $$port] = explode(":", $$h, 2); $$port=(int) $$port; } $$n=getenv("WORDPRESS_DB_NAME"); $$u=getenv("WORDPRESS_DB_USER"); $$p=getenv("WORDPRESS_DB_PASSWORD"); $$m=@new mysqli($$h, $$u, $$p, $$n, $$port); if ($$m->connect_errno) { fwrite(STDERR, $$m->connect_error . PHP_EOL); exit(1); }' >/dev/null 2>&1; do
          attempts=$$((attempts + 1));
          if [ "$$attempts" -ge 20 ]; then
            echo "Database connection failed. Last PHP mysqli error:";
            php -r '$$h=getenv("WORDPRESS_DB_HOST"); $$port=3306; if (strpos($$h, ":") !== false) { [$$h, $$port] = explode(":", $$h, 2); $$port=(int) $$port; } $$n=getenv("WORDPRESS_DB_NAME"); $$u=getenv("WORDPRESS_DB_USER"); $$p=getenv("WORDPRESS_DB_PASSWORD"); $$m=@new mysqli($$h, $$u, $$p, $$n, $$port); if ($$m->connect_errno) { fwrite(STDERR, $$m->connect_error . PHP_EOL); exit(1); }';
            exit 1;
          fi;
          echo "Waiting for database...";
          sleep 3;
        done;
        if wp core is-installed --path=/var/www/html >/dev/null 2>&1; then
          echo "WordPress is already installed.";
        else
          wp core install \
            --path=/var/www/html \
            --url="$$WORDPRESS_URL" \
            --title="$$WORDPRESS_SITE_TITLE" \
            --admin_user="$$WORDPRESS_ADMIN_USER" \
            --admin_password="$$WORDPRESS_ADMIN_PASSWORD" \
            --admin_email="$$WORDPRESS_ADMIN_EMAIL" \
            --skip-email;
        fi
    volumes:
      - ./html:/var/www/html
    networks:
      - wp_network

  nginx:
    image: nginx:stable
    restart: always
    depends_on:
      wordpress:
        condition: service_started
      wpcli:
        condition: service_completed_successfully
    ports:
      - 80:80
      - 443:443
    environment:
      DOMAIN: ${DOMAIN}
      WWW_DOMAIN: ${WWW_DOMAIN}
    command:
      - /bin/sh
      - -c
      - |
        if [ -f /etc/letsencrypt/live/$DOMAIN/fullchain.pem ] && [ -f /etc/letsencrypt/live/$DOMAIN/privkey.pem ]; then
          envsubst '$$DOMAIN $$WWW_DOMAIN' < /etc/nginx/templates/ssl.conf.template > /etc/nginx/conf.d/default.conf;
        else
          envsubst '$$DOMAIN $$WWW_DOMAIN' < /etc/nginx/templates/http.conf.template > /etc/nginx/conf.d/default.conf;
        fi;
        nginx -t;
        nginx -g 'daemon off;'
    volumes:
      - ./nginx-http.conf.template:/etc/nginx/templates/http.conf.template:ro
      - ./nginx.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - ./html:/var/www/html:ro
      - ./html/.well-known/acme-challenge:/var/www/html/.well-known/acme-challenge:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - wp_network

  certbot:
    image: certbot/certbot
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./html/.well-known/acme-challenge:/var/www/html/.well-known/acme-challenge:rw
    networks:
      - wp_network

volumes:
  db_data:

networks:
  wp_network:
    driver: bridge
